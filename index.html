<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa del viento — Google Maps + Tomorrow.io</title>
<style>
:root {
  --primary: #00365a;
  --secondary: #184f90;
  --bg: #f0f2f5;
  --panel: #ffffff;
  --text: #3a3a3a;
  --muted: #8f8f8f;
  --sep: #e0e4ea;
  --error: #c43d4b;
  --info: #3195a5;
  --ok: #3e884f;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 13px; color: var(--text); }
.layout { display: flex; height: 100vh; width: 100vw; }

/* ── SIDEBAR ── */
.sidebar { width: 280px; flex-shrink: 0; background: var(--panel); border-right: 1px solid var(--sep); display: flex; flex-direction: column; }
.sidebar-head { padding: 14px 16px; background: var(--primary); }
.sidebar-head h1 { font-size: 14px; font-weight: 700; color: #fff; }
.sidebar-head p  { font-size: 11px; color: rgba(255,255,255,0.55); margin-top: 2px; }
.sidebar-body { flex: 1; overflow-y: auto; padding: 14px; }
.sidebar-body::-webkit-scrollbar { width: 3px; }
.sidebar-body::-webkit-scrollbar-thumb { background: var(--sep); }
.sidebar-foot { padding: 8px 14px; border-top: 1px solid var(--sep); font-size: 10px; color: var(--muted); text-align: center; }

/* ── FORM ── */
label.lbl { display: block; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); margin-bottom: 4px; }
input, select { display: block; width: 100%; padding: 8px 10px; border: 1px solid var(--sep); border-radius: 7px; font-size: 12px; font-family: inherit; background: #f8f9fb; color: var(--text); margin-bottom: 8px; }
input:focus, select:focus { outline: none; border-color: var(--secondary); background: #fff; }
.btn { display: block; width: 100%; padding: 10px; border: none; border-radius: 7px; font-size: 13px; font-weight: 700; font-family: inherit; cursor: pointer; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--secondary); }
.btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
.btn-ghost { background: transparent; color: var(--primary); border: 1px solid var(--sep); font-size: 11px; padding: 6px 10px; border-radius: 6px; cursor: pointer; font-family: inherit; }
.btn-ghost:hover { background: var(--bg); }
hr { border: none; border-top: 1px solid var(--sep); margin: 12px 0; }

/* ── MENSAJES ── */
.msg { font-size: 11px; padding: 7px 10px; border-radius: 7px; margin-bottom: 8px; display: none; line-height: 1.5; }
.msg.err { background: #fbe9eb; color: var(--error); display: block; }
.msg.inf { background: #e7f3f5; color: var(--info);  display: block; }
.msg.ok  { background: #e9f3ea; color: var(--ok);    display: block; }

/* ── STATUS VIENTO ── */
.wind-status { font-size: 11px; color: var(--muted); margin-top: 8px; min-height: 16px; }
.wind-status.loading { color: var(--info); }
.wind-status.done    { color: var(--ok); }
.wind-status.err     { color: var(--error); }

/* ── LEYENDA ── */
.legend { margin-top: 12px; }
.legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 11px; color: var(--muted); }
.legend-arrow { flex-shrink: 0; }

/* ── MAPA ── */
.map-area { flex: 1; position: relative; }
#map { width: 100%; height: 100%; }
#map-msg { position: absolute; top: 10px; left: 10px; right: 10px; z-index: 10; font-size: 12px; padding: 8px 12px; border-radius: 8px; display: none; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
#map-msg.err { background: #fbe9eb; color: var(--error); display: block; }
#map-msg.inf { background: #e7f3f5; color: var(--info);  display: block; }
</style>
</head>
<body>
<div class="layout">

  <!-- ── PANEL ── -->
  <aside class="sidebar">
    <div class="sidebar-head">
      <h1>Mapa del viento</h1>
      <p>Google Maps + Tomorrow.io</p>
    </div>

    <div class="sidebar-body">

      <label class="lbl">API Keys</label>
      <input type="password" id="gkey" placeholder="Google Maps API key">
      <input type="password" id="tkey" placeholder="Tomorrow.io API key">
      <div style="display:flex;gap:6px;margin-bottom:8px;">
        <button class="btn-ghost" id="btn-show">Mostrar</button>
        <button class="btn btn-primary" id="btn-load-keys" style="flex:1;">Cargar Keys</button>
      </div>
      <div class="msg" id="keys-msg"></div>

      <hr>

      <div id="query-section" style="display:none;">
        <label class="lbl">Coordenadas</label>
        <input type="text" id="lat" placeholder="Latitud"  value="9.9281">
        <input type="text" id="lng" placeholder="Longitud" value="-84.0907">
        <button class="btn btn-primary" id="btn-goto" style="margin-bottom:8px;">Cargar Mapa</button>
        <p style="font-size:10px;color:var(--muted);margin-bottom:8px;">También puedes hacer clic en el mapa.</p>

        <hr>

        <label class="lbl">Capa de viento</label>
        <div style="display:flex;gap:6px;margin-bottom:8px;">
          <button class="btn btn-primary" id="btn-wind-on"  style="flex:1;font-size:12px;">Activar</button>
          <button class="btn btn-ghost"   id="btn-wind-off" style="flex:1;font-size:12px;">Desactivar</button>
        </div>
        <div class="wind-status" id="wind-status"></div>

        <hr>

        <!-- Contador de llamadas -->
        <label class="lbl">Uso de API · Tomorrow.io</label>
        <div style="background:var(--bg);border-radius:7px;padding:10px 12px;font-size:12px;">
          <div style="display:flex;justify-content:space-between;margin-bottom:6px;">
            <span style="color:var(--muted);">Llamadas esta sesión</span>
            <span style="font-weight:700;color:var(--primary);" id="api-calls">0</span>
          </div>
          <div style="display:flex;justify-content:space-between;margin-bottom:6px;">
            <span style="color:var(--muted);">Límite aprox. por hora</span>
            <span style="font-weight:700;color:var(--muted);">25</span>
          </div>
          <div style="background:var(--sep);border-radius:4px;height:6px;margin-bottom:8px;">
            <div id="api-bar" style="background:var(--secondary);border-radius:4px;height:6px;width:0%;transition:width 0.4s;"></div>
          </div>
          <div id="api-reset-msg" style="font-size:10px;color:var(--muted);text-align:center;">—</div>
        </div>

        <hr>

        <!-- Leyenda -->
        <label class="lbl">Leyenda</label>
        <div class="legend">
          <div class="legend-item">
            <svg class="legend-arrow" width="20" height="20" viewBox="0 0 20 20">
              <polygon points="10,2 6,14 10,11 14,14" fill="#184f90" opacity="0.9"/>
            </svg>
            Flecha = dirección hacia donde va el viento
          </div>
          <div class="legend-item">
            <svg class="legend-arrow" width="20" height="20" viewBox="0 0 20 20">
              <polygon points="10,2 7,12 10,9 13,12" fill="#184f90" opacity="0.5" transform="scale(0.7) translate(4,3)"/>
            </svg>
            Tamaño = velocidad del viento
          </div>
        </div>
      </div>

    </div>

    <div class="sidebar-foot" id="version-footer">
      Google Maps + Tomorrow.io · <span style="color:#8a9fb4;">v1.6 · 2026-06-18 23:45 UTC</span>
    </div>
  </aside>

  <!-- ── MAPA ── -->
  <div class="map-area">
    <div id="map-msg"></div>
    <div id="map"></div>
  </div>

</div>

<script>
'use strict';

// ════════════════════════════════════════════════
//  ESTADO GLOBAL
// ════════════════════════════════════════════════
let GKEY = '', TKEY = '';
let map = null, mapReady = false;
let windLayer = null;
let apiCallCount = 0;
let rateLimitHitAt = null;

function setMsg(id, text, cls) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = 'msg ' + (cls || '');
}
function setMapMsg(text, cls) {
  const el = document.getElementById('map-msg');
  el.textContent = text;
  el.className = cls || '';
}
function setWindStatus(text, cls) {
  const el = document.getElementById('wind-status');
  el.textContent = text;
  el.className = 'wind-status ' + (cls || '');
}

function updateApiCounter(increment) {
  if (increment) apiCallCount++;
  const el     = document.getElementById('api-calls');
  const bar    = document.getElementById('api-bar');
  const msgEl  = document.getElementById('api-reset-msg');
  if (!el) return;

  el.textContent = apiCallCount;

  // Barra de progreso (sobre 25)
  const pct = Math.min(100, (apiCallCount / 25) * 100);
  bar.style.width = pct + '%';
  bar.style.background = pct >= 100 ? '#c43d4b' : pct >= 70 ? '#FF9800' : '#184f90';

  // Mensaje de reset
  if (rateLimitHitAt) {
    startResetCountdown(rateLimitHitAt);
  } else if (pct >= 80) {
    msgEl.textContent = 'Acercándote al límite — próximo reset: ' + nextHourUTC();
    msgEl.style.color = '#FF9800';
  } else {
    msgEl.textContent = 'Reset cada hora en punto UTC · Próximo: ' + nextHourUTC();
    msgEl.style.color = 'var(--muted)';
  }
}

function nextHourUTC() {
  const now  = new Date();
  const next = new Date(Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate(), now.getUTCHours() + 1, 0, 0, 0));
  return next.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) + ' (hora local)';
}

function startResetCountdown(hitAt) {
  const msgEl = document.getElementById('api-reset-msg');
  if (!msgEl) return;
  // El reset ocurre al inicio de la próxima hora UTC
  const hitDate = new Date(hitAt);
  const reset   = new Date(Date.UTC(hitDate.getUTCFullYear(), hitDate.getUTCMonth(), hitDate.getUTCDate(), hitDate.getUTCHours() + 1, 0, 0, 0));
  const diff    = Math.max(0, Math.ceil((reset - Date.now()) / 1000));
  const mins    = Math.floor(diff / 60);
  const secs    = diff % 60;
  msgEl.style.color = '#c43d4b';
  msgEl.textContent = '⏳ Límite alcanzado · Reset en ' + mins + 'm ' + secs + 's';
  if (diff > 0) {
    setTimeout(() => startResetCountdown(hitAt), 1000);
  } else {
    rateLimitHitAt = null;
    apiCallCount   = 0;
    updateApiCounter(false);
    msgEl.style.color = 'var(--ok)';
    msgEl.textContent = '✓ Cuota reseteada — puedes consultar de nuevo';
  }
}

// ── Helper dirección cardinal ──
function compassLabel(deg) {
  const dirs = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
  return dirs[Math.round(deg / 22.5) % 16];
}

// ════════════════════════════════════════════════
//  CLASE WindLayer
// ════════════════════════════════════════════════
class WindLayer {

  /**
   * @param {google.maps.Map} map
   * @param {string} apiKey  - Tomorrow.io API key
   * @param {Function} onStatus - callback(text, cls) para mostrar estado
   */
  constructor(map, apiKey, onStatus) {
    this.map       = map;
    this.apiKey    = apiKey;
    this.onStatus  = onStatus || (() => {});
    this.markers   = [];       // AdvancedMarkerElement activos
    this.cache     = {};       // { "lat,lng": { data, ts } }
    this.cacheTTL  = 10 * 60 * 1000; // 10 minutos
    this.debounceTimer = null;
    this.debounceDelay = 800;  // ms después del último evento
    this.active    = false;
    this.maxConcurrent = 5;    // llamadas simultáneas a Tomorrow.io
    this._listeners = [];
  }

  // ── Activar la capa ──
  activate() {
    if (this.active) return;
    this.active = true;
    const refresh = () => this._debounceRefresh();
    const il = this.map.addListener('idle', refresh);
    this._listeners.push(il);
    // Forzar primera carga: si getBounds ya está disponible, disparar de inmediato
    // Si no, esperar al primer idle
    if (this.map.getBounds()) {
      this._refresh();
    }
    // El listener idle cubrirá el caso de que getBounds() sea null todavía
  }

  // ── Desactivar la capa ──
  deactivate() {
    this.active = false;
    this._listeners.forEach(l => google.maps.event.removeListener(l));
    this._listeners = [];
    clearTimeout(this.debounceTimer);
    this._clearMarkers();
    this.onStatus('Capa desactivada.', '');
  }

  // ── Debounce: esperar que el mapa deje de moverse ──
  _debounceRefresh() {
    clearTimeout(this.debounceTimer);
    this.debounceTimer = setTimeout(() => {
      if (this.active) this._refresh();
    }, this.debounceDelay);
  }

  // ── Ciclo principal de actualización ──
  async _refresh() {
    if (!this.active) return;
    const bounds = this.map.getBounds();
    if (!bounds) {
      this.onStatus('Esperando bounds del mapa...', 'loading');
      return;
    }
    const zoom = this.map.getZoom();
    const grid = this._generateGrid(bounds, zoom);
    if (grid.length === 0) return;

    this.onStatus('Cargando ' + grid.length + ' puntos (zoom ' + zoom + ')...', 'loading');

    try {
      const results = await this._fetchGrid(grid);
      if (!this.active) return;
      if (results.length === 0) {
        this.onStatus('Sin resultados. Verifica la API key de Tomorrow.io.', 'err');
        return;
      }
      this._clearMarkers();
      this._drawArrows(results);
      this.onStatus('✓ ' + results.length + ' flechas dibujadas · zoom ' + zoom, 'done');
    } catch (err) {
      this.onStatus('Error: ' + err.message, 'err');
    }
  }

  // ── Generar cuadrícula según viewport y zoom ──
  _generateGrid(bounds, zoom) {
    // Densidad según zoom
    let cols, rows;
    if      (zoom <= 4)  { cols = 4;  rows = 3; }
    else if (zoom <= 6)  { cols = 5;  rows = 4; }
    else if (zoom <= 8)  { cols = 6;  rows = 5; }
    else if (zoom <= 10) { cols = 8;  rows = 6; }
    else if (zoom <= 12) { cols = 10; rows = 8; }
    else                 { cols = 12; rows = 10; }

    const ne  = bounds.getNorthEast();
    const sw  = bounds.getSouthWest();
    const latN = ne.lat(), latS = sw.lat();
    const lngW = sw.lng(), lngE = ne.lng();

    const latStep = (latN - latS) / (rows + 1);
    const lngStep = (lngE - lngW) / (cols + 1);

    const grid = [];
    for (let r = 1; r <= rows; r++) {
      for (let c = 1; c <= cols; c++) {
        const lat = latS + r * latStep;
        const lng = lngW + c * lngStep;
        grid.push({ lat: parseFloat(lat.toFixed(4)), lng: parseFloat(lng.toFixed(4)) });
      }
    }
    return grid;
  }

  // ── Consultar Tomorrow.io para toda la grilla — UNA sola llamada batch ──
  async _fetchGrid(grid) {
    // Separar puntos con caché de los que necesitan consulta
    const results = [];
    const toFetch = [];

    grid.forEach(pt => {
      const key = pt.lat.toFixed(3) + ',' + pt.lng.toFixed(3);
      const cached = this.cache[key];
      if (cached && (Date.now() - cached.ts) < this.cacheTTL) {
        results.push({ ...pt, ...cached.data });
      } else {
        toFetch.push(pt);
      }
    });

    if (toFetch.length === 0) return results;

    // POST /v4/weather/realtime/batch — todos los puntos en una sola llamada
    const locations = toFetch.map(pt => ({ lat: pt.lat, lon: pt.lng }));

    const res = await fetch(
      'https://api.tomorrow.io/v4/weather/realtime/batch?apikey=' + this.apiKey,
      {
        method: 'POST',
        headers: { 'accept': 'application/json', 'content-type': 'application/json' },
        body: JSON.stringify({
          locations: locations,
          fields: ['windSpeed', 'windDirection'],
          units: 'metric'
        })
      }
    );

    // Contar la llamada
    updateApiCounter(true);

    if (res.status === 429) {
      rateLimitHitAt = Date.now();
      startResetCountdown(rateLimitHitAt);
      throw new Error('Rate limit alcanzado. Próximo reset: ' + nextHourUTC());
    }
    if (!res.ok) {
      const body = await res.text().catch(() => '');
      throw new Error('HTTP ' + res.status + ': ' + body.slice(0, 120));
    }

    const json = await res.json();

    // La respuesta batch es un array con un objeto por location
    const items = Array.isArray(json) ? json : (json.data || []);
    items.forEach((item, idx) => {
      const pt = toFetch[idx];
      if (!pt) return;
      const v = item.data ? item.data.values : (item.values || {});
      const data = {
        windSpeed:     v.windSpeed     != null ? v.windSpeed     : 0,
        windDirection: v.windDirection != null ? v.windDirection : 0
      };
      const key = pt.lat.toFixed(3) + ',' + pt.lng.toFixed(3);
      this.cache[key] = { data, ts: Date.now() };
      results.push({ ...pt, ...data });
    });

    return results;
  }

  // ── Dibujar flechas SVG en el mapa ──
  _drawArrows(points) {
    if (!this.map) return;
    points.forEach(pt => {
      const displayDir = (pt.windDirection + 180) % 360;
      const speed      = pt.windSpeed;
      const el         = this._makeArrowElement(displayDir, speed);

      try {
        const marker = new google.maps.marker.AdvancedMarkerElement({
          position: { lat: pt.lat, lng: pt.lng },
          map:      this.map,
          content:  el,
          title:    Math.round(speed) + ' km/h · ' + compassLabel(pt.windDirection)
        });
        this.markers.push(marker);
      } catch(e) {
        console.error('Error creando marker:', e);
      }
    });
  }

  // ── Crear elemento SVG de la flecha ──
  _makeArrowElement(deg, speed) {
    // Escalar tamaño según velocidad (mín 18px, máx 40px)
    const size = Math.max(18, Math.min(40, 18 + speed * 1.2));

    const NS   = 'http://www.w3.org/2000/svg';
    const wrap = document.createElement('div');
    wrap.style.cssText = 'display:flex;flex-direction:column;align-items:center;pointer-events:none;';

    const svg = document.createElementNS(NS, 'svg');
    svg.setAttribute('width',   size);
    svg.setAttribute('height',  size);
    svg.setAttribute('viewBox', '0 0 20 20');
    svg.style.transform       = 'rotate(' + Math.round(deg) + 'deg)';
    svg.style.display         = 'block';
    svg.style.filter          = 'drop-shadow(0 1px 2px rgba(0,0,0,0.3))';

    // Flecha: punta arriba = norte (0°), rota según displayDir
    const arrow = document.createElementNS(NS, 'polygon');
    arrow.setAttribute('points', '10,1 6,15 10,11 14,15');
    arrow.setAttribute('fill',   this._speedColor(speed));
    arrow.setAttribute('opacity','0.9');
    svg.appendChild(arrow);

    wrap.appendChild(svg);
    return wrap;
  }

  // ── Color según velocidad ──
  _speedColor(speed) {
    if (speed < 5)  return '#4CAF50'; // calma — verde
    if (speed < 15) return '#2196F3'; // suave — azul
    if (speed < 30) return '#FF9800'; // moderado — naranja
    return '#F44336';                 // fuerte — rojo
  }

  // ── Limpiar marcadores del mapa ──
  _clearMarkers() {
    this.markers.forEach(m => { m.map = null; });
    this.markers = [];
  }
}

// ════════════════════════════════════════════════
//  INICIALIZAR GOOGLE MAPS
// ════════════════════════════════════════════════
function initWeatherMap() {
  mapReady = true;
  map = new google.maps.Map(document.getElementById('map'), {
    center: { lat: 9.9281, lng: -84.0907 },
    zoom: 8,
    mapId: 'DEMO_MAP_ID',
    mapTypeControl: true,
    mapTypeControlOptions: {
      style:      google.maps.MapTypeControlStyle.HORIZONTAL_BAR,
      position:   google.maps.ControlPosition.TOP_RIGHT,
      mapTypeIds: ['roadmap', 'satellite', 'hybrid', 'terrain']
    },
    streetViewControl: false,
    fullscreenControl: true
  });

  // Clic en el mapa actualiza coordenadas
  map.addListener('click', function(e) {
    document.getElementById('lat').value = e.latLng.lat().toFixed(4);
    document.getElementById('lng').value = e.latLng.lng().toFixed(4);
  });

  // Instanciar WindLayer (inactiva hasta que el usuario la active)
  windLayer = new WindLayer(map, TKEY, setWindStatus);

  setMsg('keys-msg', 'Mapa cargado. Activa la capa de viento cuando quieras.', 'ok');
}
window.initWeatherMap = initWeatherMap;

// ════════════════════════════════════════════════
//  EVENTOS UI
// ════════════════════════════════════════════════
document.getElementById('btn-show').addEventListener('click', function() {
  const g = document.getElementById('gkey');
  const t = document.getElementById('tkey');
  g.type = g.type === 'password' ? 'text' : 'password';
  t.type = t.type === 'password' ? 'text' : 'password';
  this.textContent = g.type === 'password' ? 'Mostrar' : 'Ocultar';
});

document.getElementById('btn-load-keys').addEventListener('click', function() {
  const g = document.getElementById('gkey').value.trim();
  const t = document.getElementById('tkey').value.trim();
  if (!g) { setMsg('keys-msg', 'Ingresa la API key de Google Maps.', 'err'); return; }
  if (!t) { setMsg('keys-msg', 'Ingresa la API key de Tomorrow.io.', 'err'); return; }
  GKEY = g; TKEY = t;
  setMsg('keys-msg', 'Cargando mapa...', 'inf');
  document.getElementById('query-section').style.display = 'block';
  const s = document.createElement('script');
  s.src = 'https://maps.googleapis.com/maps/api/js?key=' + encodeURIComponent(GKEY) + '&callback=initWeatherMap&libraries=marker&v=beta';
  s.async = true; s.defer = true;
  s.onerror = () => setMapMsg('No se pudo cargar Google Maps. Verifica la API key y el dominio autorizado.', 'err');
  document.body.appendChild(s);
  setTimeout(() => {
    if (!mapReady) setMapMsg('Google Maps tardó demasiado. Verifica la key y el dominio autorizado.', 'err');
  }, 7000);
});

document.getElementById('btn-goto').addEventListener('click', function() {
  const lat = parseFloat(document.getElementById('lat').value);
  const lng = parseFloat(document.getElementById('lng').value);
  if (isNaN(lat) || isNaN(lng)) { setMapMsg('Ingresa coordenadas válidas.', 'err'); return; }
  if (!mapReady) { setMapMsg('Primero carga las keys.', 'err'); return; }
  map.setCenter({ lat, lng });
});

document.getElementById('btn-wind-on').addEventListener('click', function() {
  if (!windLayer) { setWindStatus('Primero carga las keys.', 'err'); return; }
  windLayer.activate();
  setWindStatus('Activando...', 'loading');
  updateApiCounter(false);
});

document.getElementById('btn-wind-off').addEventListener('click', function() {
  if (windLayer) windLayer.deactivate();
});

document.addEventListener('keydown', function(e) {
  if (e.key !== 'Enter') return;
  const id = document.activeElement.id;
  if (id === 'gkey' || id === 'tkey') document.getElementById('btn-load-keys').click();
  if (id === 'lat'  || id === 'lng')  document.getElementById('btn-goto').click();
});
</script>
</body>
