<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa del viento — Google Maps</title>
<style>
:root {
  --primary: #00365a;
  --secondary: #184f90;
  --bg: #f0f2f5;
  --panel: #ffffff;
  --text: #3a3a3a;
  --muted: #8f8f8f;
  --sep: #e0e4ea;
  --error: #c43d4b;
  --info: #3195a5;
  --ok: #3e884f;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 13px; color: var(--text); }

.layout { display: flex; height: 100vh; width: 100vw; }

/* ── SIDEBAR ── */
.sidebar {
  width: 280px;
  flex-shrink: 0;
  background: var(--panel);
  border-right: 1px solid var(--sep);
  display: flex;
  flex-direction: column;
}
.sidebar-head {
  padding: 14px 16px;
  background: var(--primary);
}
.sidebar-head h1 { font-size: 14px; font-weight: 700; color: #fff; }
.sidebar-head p  { font-size: 11px; color: rgba(255,255,255,0.55); margin-top: 2px; }

.sidebar-body { flex: 1; overflow-y: auto; padding: 14px; }

.sidebar-foot {
  padding: 8px 14px;
  border-top: 1px solid var(--sep);
  font-size: 10px;
  color: var(--muted);
  text-align: center;
}

/* ── FORM ── */
label.lbl {
  display: block;
  font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.05em;
  color: var(--muted); margin-bottom: 4px;
}
input, select {
  display: block; width: 100%;
  padding: 8px 10px;
  border: 1px solid var(--sep); border-radius: 7px;
  font-size: 12px; font-family: inherit;
  background: #f8f9fb; color: var(--text);
  margin-bottom: 8px;
}
input:focus, select:focus { outline: none; border-color: var(--secondary); background: #fff; }

.btn {
  display: block; width: 100%; padding: 10px;
  border: none; border-radius: 7px;
  font-size: 13px; font-weight: 700; font-family: inherit;
  cursor: pointer;
}
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--secondary); }
.btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
.btn-ghost {
  background: transparent; color: var(--primary);
  border: 1px solid var(--sep); font-size: 11px;
  padding: 6px 10px; border-radius: 6px;
  cursor: pointer; font-family: inherit;
}
.btn-ghost:hover { background: var(--bg); }

hr { border: none; border-top: 1px solid var(--sep); margin: 12px 0; }

/* ── MENSAJES ── */
.msg { font-size: 11px; padding: 7px 10px; border-radius: 7px; margin-bottom: 8px; display: none; line-height: 1.5; }
.msg.err { background: #fbe9eb; color: var(--error); display: block; }
.msg.inf { background: #e7f3f5; color: var(--info);  display: block; }
.msg.ok  { background: #e9f3ea; color: var(--ok);    display: block; }

/* ── MAPA ── */
.map-area { flex: 1; position: relative; }
#map { width: 100%; height: 100%; }
#map-msg {
  position: absolute; top: 10px; left: 10px; right: 10px; z-index: 10;
  font-size: 12px; padding: 8px 12px; border-radius: 8px; display: none;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}
#map-msg.err { background: #fbe9eb; color: var(--error); display: block; }
#map-msg.inf { background: #e7f3f5; color: var(--info);  display: block; }
</style>
</head>
<body>
<div class="layout">

  <!-- ── PANEL IZQUIERDO ── -->
  <aside class="sidebar">
    <div class="sidebar-head">
      <h1>Mapa del viento</h1>
      <p>Google Maps</p>
    </div>

    <div class="sidebar-body">

      <!-- API Keys -->
      <label class="lbl">API Keys</label>
      <input type="password" id="gkey" placeholder="Google Maps API key">
      <input type="password" id="tkey" placeholder="Tomorrow.io API key">
      <div style="display:flex;gap:6px;margin-bottom:8px;">
        <button class="btn-ghost" id="btn-show">Mostrar</button>
        <button class="btn btn-primary" id="btn-load" style="flex:1;">Cargar mapa</button>
      </div>
      <div class="msg" id="keys-msg"></div>

      <hr>

      <!-- Coordenadas -->
      <div id="query-section" style="display:none;">
        <label class="lbl">Coordenadas</label>
        <input type="text" id="lat" placeholder="Latitud"  value="9.9281">
        <input type="text" id="lng" placeholder="Longitud" value="-84.0907">
        <p style="font-size:10px;color:var(--muted);margin-bottom:8px;">También puedes hacer clic en el mapa.</p>
      </div>

    </div>

    <div class="sidebar-foot">Google Maps · <span style="color:#8a9fb4;">v1.0</span></div>
  </aside>

  <!-- ── MAPA ── -->
  <div class="map-area">
    <div id="map-msg"></div>
    <div id="map"></div>
  </div>

</div>

<script>
'use strict';

let GKEY = '', TKEY = '';
let map = null, mapReady = false;
let mainMarker = null;

function setMsg(id, text, cls) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = 'msg ' + (cls || '');
}

function setMapMsg(text, cls) {
  const el = document.getElementById('map-msg');
  el.textContent = text;
  el.className = cls || '';
}

// ── Google Maps ──
function initWeatherMap() {
  mapReady = true;
  map = new google.maps.Map(document.getElementById('map'), {
    center: { lat: 9.9281, lng: -84.0907 },
    zoom: 8,
    mapId: 'DEMO_MAP_ID',
    mapTypeControl: true,
    mapTypeControlOptions: {
      style: google.maps.MapTypeControlStyle.HORIZONTAL_BAR,
      position: google.maps.ControlPosition.TOP_RIGHT,
      mapTypeIds: ['roadmap', 'satellite', 'hybrid', 'terrain']
    },
    streetViewControl: false,
    fullscreenControl: true
  });

  map.addListener('click', function(e) {
    const lat = e.latLng.lat();
    const lng = e.latLng.lng();
    document.getElementById('lat').value = lat.toFixed(4);
    document.getElementById('lng').value = lng.toFixed(4);
    placeMarker(lat, lng);
  });
}
window.initWeatherMap = initWeatherMap;

function placeMarker(lat, lng) {
  if (!mapReady || !map) return;
  if (mainMarker) mainMarker.map = null;
  mainMarker = new google.maps.marker.AdvancedMarkerElement({
    position: { lat: lat, lng: lng },
    map: map
  });
  map.panTo({ lat: lat, lng: lng });
}

// ── Eventos ──
document.getElementById('btn-show').addEventListener('click', function() {
  const g = document.getElementById('gkey');
  const t = document.getElementById('tkey');
  g.type = g.type === 'password' ? 'text' : 'password';
  t.type = t.type === 'password' ? 'text' : 'password';
  this.textContent = g.type === 'password' ? 'Mostrar' : 'Ocultar';
});

document.getElementById('btn-load').addEventListener('click', function() {
  const g = document.getElementById('gkey').value.trim();
  const t = document.getElementById('tkey').value.trim();
  if (!g) { setMsg('keys-msg', 'Ingresa la API key de Google Maps.', 'err'); return; }
  GKEY = g; TKEY = t;
  setMsg('keys-msg', 'Cargando mapa...', 'ok');
  document.getElementById('query-section').style.display = 'block';
  const s = document.createElement('script');
  s.src = 'https://maps.googleapis.com/maps/api/js?key=' + encodeURIComponent(GKEY) + '&callback=initWeatherMap&libraries=marker&v=beta';
  s.async = true; s.defer = true;
  s.onerror = function() { setMapMsg('No se pudo cargar Google Maps. Verifica la API key y el dominio autorizado.', 'err'); };
  document.body.appendChild(s);
  setTimeout(function() {
    if (!mapReady) setMapMsg('Google Maps tardó demasiado. Verifica la key y el dominio autorizado.', 'err');
  }, 6000);
});

document.addEventListener('keydown', function(e) {
  if (e.key !== 'Enter') return;
  const id = document.activeElement.id;
  if (id === 'gkey' || id === 'tkey') document.getElementById('btn-load').click();
});
</script>
</body>
</html>
