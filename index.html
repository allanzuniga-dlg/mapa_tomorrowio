<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clima y dirección del viento — Google Maps + Tomorrow.io</title>
<style>
:root {
  --bg: #f0f2f5;
  --panel: #ffffff;
  --primary: #00365a;
  --secondary: #184f90;
  --accent: #8a9fb4;
  --text: #3a3a3a;
  --muted: #8f8f8f;
  --sep: #e0e4ea;
  --success: #3e884f;
  --error: #c43d4b;
  --info: #3195a5;
  --panel-w: 320px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; font-family: 'Nunito', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); font-size: 13px; }

/* Layout principal */
.layout { display: flex; height: 100vh; width: 100vw; }

/* Panel izquierdo */
.sidebar {
  width: var(--panel-w);
  flex-shrink: 0;
  background: var(--panel);
  border-right: 1px solid var(--sep);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.sidebar-header {
  padding: 14px 16px 10px;
  border-bottom: 1px solid var(--sep);
  background: var(--primary);
}
.sidebar-header h1 { font-size: 13px; font-weight: 700; color: #fff; margin: 0 0 2px; }
.sidebar-header p { font-size: 11px; color: rgba(255,255,255,0.6); }
.sidebar-body { flex: 1; overflow-y: auto; padding: 12px 14px; }
.sidebar-body::-webkit-scrollbar { width: 4px; }
.sidebar-body::-webkit-scrollbar-thumb { background: var(--sep); border-radius: 4px; }

/* Secciones del panel */
.section { margin-bottom: 14px; }
.section-label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--accent);
  margin-bottom: 8px;
}

/* Inputs */
input[type="text"], input[type="password"], select {
  width: 100%;
  padding: 7px 10px;
  border: 1px solid var(--sep);
  border-radius: 7px;
  font-size: 12px;
  font-family: inherit;
  background: #f8f9fb;
  color: var(--text);
  margin-bottom: 6px;
}
input:focus, select:focus { outline: none; border-color: var(--secondary); background: #fff; }

/* Botones */
.btn {
  display: block;
  width: 100%;
  padding: 8px 12px;
  border: none;
  border-radius: 50px;
  font-size: 12px;
  font-family: inherit;
  font-weight: 700;
  cursor: pointer;
  text-align: center;
}
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--secondary); }
.btn-secondary { background: transparent; color: var(--primary); border: 1px solid var(--sep); margin-top: 5px; }
.btn-secondary:hover { background: var(--bg); }
.btn-sm {
  display: inline-block;
  width: auto;
  padding: 5px 12px;
  font-size: 11px;
}
.btn-row { display: flex; gap: 6px; margin-top: 5px; }
.btn-row .btn { flex: 1; }

/* Mensajes */
.msg {
  font-size: 11px;
  padding: 7px 10px;
  border-radius: 7px;
  margin-bottom: 8px;
  display: none;
  line-height: 1.5;
}
.msg-error { background: #fbe9eb; color: var(--error); display: block; }
.msg-info { background: #e7f3f5; color: var(--info); display: block; }
.msg-success { background: #e9f3ea; color: var(--success); display: block; }

/* Tarjeta de clima */
.weather-main {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 10px;
}
.weather-loc { font-weight: 700; font-size: 13px; color: var(--primary); }
.weather-time { font-size: 10px; color: var(--muted); margin-top: 2px; }
.weather-temp { font-size: 28px; font-weight: 700; color: var(--primary); line-height: 1; }

.metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.metric {
  background: var(--bg);
  border-radius: 7px;
  padding: 8px 10px;
}
.metric-lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 3px; }
.metric-val { font-size: 14px; font-weight: 700; color: var(--text); }
.wind-row { display: flex; align-items: center; gap: 6px; }
.wind-sub { font-size: 10px; color: var(--muted); margin-top: 2px; }

/* Pronóstico horario */
.hourly-wrap { overflow-x: auto; padding-bottom: 4px; }
.hourly-wrap::-webkit-scrollbar { height: 3px; }
.hourly-wrap::-webkit-scrollbar-thumb { background: var(--sep); border-radius: 3px; }
.hourly-inner { display: flex; gap: 6px; width: max-content; }
.hour-card {
  width: 60px;
  background: var(--bg);
  border-radius: 7px;
  padding: 7px 5px;
  text-align: center;
  flex-shrink: 0;
}
.hour-time { font-size: 10px; color: var(--muted); margin-bottom: 4px; }
.hour-wind-arrow { width: 26px; height: 26px; display: block; margin: 0 auto 3px; overflow: visible; }
.hour-temp { font-size: 12px; font-weight: 700; margin-bottom: 2px; }
.hour-wind-val { font-size: 10px; color: var(--muted); }

/* Overlay controls */
.overlay-row { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; flex-wrap: wrap; }
.overlay-row label { font-size: 11px; color: var(--muted); white-space: nowrap; }
.overlay-row input[type=range] { flex: 1; margin-bottom: 0; }
.opacity-val { font-size: 11px; font-weight: 700; color: var(--primary); min-width: 28px; }

/* Mapa derecho */
.map-area { flex: 1; position: relative; overflow: hidden; }
#map { width: 100%; height: 100%; }

/* Status sobre el mapa */
#status-msg {
  position: absolute;
  top: 10px; left: 10px; right: 10px;
  z-index: 10;
  font-size: 12px;
  padding: 8px 12px;
  border-radius: 8px;
  display: none;
  box-shadow: 0 2px 8px rgba(0,0,0,0.12);
}
#status-msg.msg-error { background: #fbe9eb; color: var(--error); display: block; }
#status-msg.msg-info { background: #e7f3f5; color: var(--info); display: block; }
#status-msg.msg-success { background: #e9f3ea; color: var(--success); display: block; }

/* Footer del sidebar */
.sidebar-footer {
  padding: 8px 14px;
  border-top: 1px solid var(--sep);
  font-size: 10px;
  color: var(--muted);
  text-align: center;
}

/* Separador */
.divider { border: none; border-top: 1px solid var(--sep); margin: 10px 0; }

/* Sección oculta hasta tener keys */
#app-section { display: none; }
</style>
</head>
<body>
<div class="layout">

  <!-- PANEL IZQUIERDO -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <h1>Clima y dirección del viento</h1>
      <p>Google Maps + Tomorrow.io</p>
    </div>

    <div class="sidebar-body">

      <!-- API Keys -->
      <div class="section">
        <div class="section-label">API Keys</div>
        <input type="password" id="google-key-input" placeholder="Google Maps API key">
        <input type="password" id="tomorrow-key-input" placeholder="Tomorrow.io API key">
        <div id="keys-status" class="msg"></div>
        <div class="btn-row">
          <button class="btn btn-secondary btn-sm" id="show-keys-btn">Mostrar</button>
          <button class="btn btn-primary btn-sm" id="save-keys-btn">Cargar</button>
        </div>
      </div>

      <hr class="divider">

      <!-- Coordenadas y unidades -->
      <div id="app-section">
        <div class="section">
          <div class="section-label">Ubicación</div>
          <input type="text" id="lat-input" placeholder="Latitud" value="9.9281">
          <input type="text" id="lng-input" placeholder="Longitud" value="-84.0907">
          <select id="units-select">
            <option value="metric" selected>Métrico (°C, km/h)</option>
            <option value="imperial">Imperial (°F, mph)</option>
          </select>
          <button class="btn btn-primary" id="go-btn">Consultar clima</button>
          <p style="font-size:10px;color:var(--muted);margin-top:5px;">También puedes hacer clic en el mapa.</p>
        </div>

        <hr class="divider">

        <!-- Clima actual -->
        <div class="section" id="weather-card" style="display:none;">
          <div class="section-label">Clima actual</div>
          <div class="weather-main">
            <div>
              <div class="weather-loc" id="loc-name">—</div>
              <div class="weather-time" id="loc-time">—</div>
            </div>
            <div class="weather-temp" id="temp-value">—</div>
          </div>
          <div class="metrics">
            <div class="metric">
              <div class="metric-lbl">Humedad</div>
              <div class="metric-val" id="humidity-val">—</div>
            </div>
            <div class="metric">
              <div class="metric-lbl">Lluvia (prob.)</div>
              <div class="metric-val" id="precip-val">—</div>
            </div>
            <div class="metric">
              <div class="metric-lbl">UV index</div>
              <div class="metric-val" id="uv-val">—</div>
            </div>
            <div class="metric">
              <div class="metric-lbl">Viento</div>
              <div class="wind-row">
                <svg id="wind-arrow" width="20" height="20" viewBox="-2 -2 28 28" style="transform:rotate(0deg);transition:transform 0.3s;flex-shrink:0;">
                  <circle cx="12" cy="12" r="11" fill="#e8eef7" stroke="#184f90" stroke-width="1.5"/>
                  <path d="M12 4 L12 20 M12 4 L8 11 M12 4 L16 11" stroke="#184f90" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                </svg>
                <div class="metric-val" id="wind-val">—</div>
              </div>
              <div class="wind-sub" id="wind-dir-label">—</div>
            </div>
          </div>
        </div>

        <hr class="divider">

        <!-- Pronóstico horario -->
        <div class="section" id="hourly-card" style="display:none;">
          <div class="section-label">Pronóstico 24h — viento</div>
          <div class="hourly-wrap">
            <div class="hourly-inner" id="hourly-scroll"></div>
          </div>
        </div>

        <hr class="divider">

        <!-- Capa meteorológica -->
        <div class="section" id="tile-card" style="display:none;">
          <div class="section-label">Capa meteorológica</div>
          <select id="layer-select">
            <option value="windDirection" selected>Dirección del viento</option>
            <option value="windSpeed">Velocidad del viento</option>
            <option value="precipitationIntensity">Precipitación</option>
            <option value="temperature">Temperatura</option>
            <option value="cloudCover">Cobertura de nubes</option>
            <option value="humidity">Humedad</option>
          </select>
          <div class="overlay-row">
            <label>Opacidad</label>
            <input type="range" id="overlay-opacity" min="0.1" max="1" step="0.05" value="0.7">
            <span class="opacity-val" id="overlay-opacity-val">70%</span>
          </div>
          <button class="btn btn-secondary btn-sm" id="toggle-overlay-btn">Ocultar capa</button>
          <p style="font-size:10px;color:var(--success);margin-top:5px;" id="tile-note-status"></p>
        </div>

      </div><!-- /app-section -->
    </div><!-- /sidebar-body -->

    <div class="sidebar-footer">
      Datos: Tomorrow.io · Mapa: Google Maps · <span style="color:var(--accent);">v2.7</span>
    </div>
  </aside>

  <!-- MAPA DERECHO -->
  <div class="map-area">
    <div id="status-msg"></div>
    <div id="map"></div>
  </div>

</div>

<script>

let GOOGLE_KEY = "";
let TOMORROW_KEY = "";
let map, marker, mapLoaded = false;

function showKeysStatus(msg, cls) {
  const el = document.getElementById('keys-status');
  el.className = cls;
  el.textContent = msg;
}

function showStatus(msg, cls) {
  const el = document.getElementById('status-msg');
  el.className = cls;
  el.textContent = msg;
}

function clearStatus() {
  const el = document.getElementById('status-msg');
  el.className = '';
  el.style.display = 'none';
}

document.getElementById('show-keys-btn').addEventListener('click', function() {
  const g = document.getElementById('google-key-input');
  const t = document.getElementById('tomorrow-key-input');
  const newType = g.type === 'password' ? 'text' : 'password';
  g.type = newType;
  t.type = newType;
});

document.getElementById('save-keys-btn').addEventListener('click', function() {
  const g = document.getElementById('google-key-input').value.trim();
  const t = document.getElementById('tomorrow-key-input').value.trim();

  if (!t) {
    showKeysStatus('Ingresa al menos la API key de Tomorrow.io para continuar.', 'msg-error');
    return;
  }

  TOMORROW_KEY = t;
  GOOGLE_KEY = g;
  showKeysStatus('Keys cargadas en memoria. Iniciando mapa y clima...', 'msg-success');
  document.getElementById('tile-card').style.display = 'block';

  document.getElementById('app-section').style.display = 'block';

  if (GOOGLE_KEY) {
    loadGoogleMapsScript(GOOGLE_KEY);
  } else {
    showStatus('No ingresaste una key de Google Maps, el mapa no se mostrará. Solo se consultará el clima.', 'msg-info');
    queryWeatherAt(9.9281, -84.0907);
  }
});

function loadGoogleMapsScript(key) {
  const existing = document.getElementById('google-maps-script');
  if (existing) existing.remove();

  const script = document.createElement('script');
  script.id = 'google-maps-script';
  script.src = `https://maps.googleapis.com/maps/api/js?key=${encodeURIComponent(key)}&callback=initWeatherMap&libraries=marker&v=beta`;
  script.async = true;
  script.defer = true;
  script.onerror = handleMapsLoadError;
  document.body.appendChild(script);

  setTimeout(function() {
    if (!mapLoaded) {
      handleMapsLoadError();
    }
  }, 5000);
}

function handleMapsLoadError() {
  if (mapLoaded) return;
  showStatus('No se pudo cargar Google Maps. Posibles causas: la key es inválida, no tiene habilitada "Maps JavaScript API", o tiene restricción de dominio (HTTP referrer) que excluye este origen. La consulta de clima seguirá funcionando sin el mapa.', 'msg-error');
  const lat = parseFloat(document.getElementById('lat-input').value);
  const lng = parseFloat(document.getElementById('lng-input').value);
  queryWeatherAt(isNaN(lat) ? 9.9281 : lat, isNaN(lng) ? -84.0907 : lng);
}

function compassLabel(deg) {
  const dirs = ["N", "NNE", "NE", "ENE", "E", "ESE", "SE", "SSE", "S", "SSW", "SW", "WSW", "W", "WNW", "NW", "NNW"];
  const idx = Math.round(deg / 22.5) % 16;
  return dirs[idx];
}

function makeWindMarkerElement(deg, speed, unit, dirLabel) {
  const NS = 'http://www.w3.org/2000/svg';
  const wrapper = document.createElement('div');
  wrapper.style.cssText = 'display:flex;flex-direction:column;align-items:center;';

  const svg = document.createElementNS(NS, 'svg');
  svg.setAttribute('width', '52');
  svg.setAttribute('height', '52');
  svg.setAttribute('viewBox', '-2 -2 28 28');
  svg.style.transform = `rotate(${Math.round(deg)}deg)`;
  svg.style.transition = 'transform 0.4s';
  svg.style.display = 'block';

  const circle = document.createElementNS(NS, 'circle');
  circle.setAttribute('cx', '12'); circle.setAttribute('cy', '12'); circle.setAttribute('r', '13');
  circle.setAttribute('fill', '#184f90'); circle.setAttribute('fill-opacity', '0.18');
  circle.setAttribute('stroke', '#184f90'); circle.setAttribute('stroke-width', '1.5');
  svg.appendChild(circle);

  const path = document.createElementNS(NS, 'path');
  path.setAttribute('d', 'M12 3 L12 21 M12 3 L7 11 M12 3 L17 11');
  path.setAttribute('stroke', '#00365a'); path.setAttribute('stroke-width', '3');
  path.setAttribute('stroke-linecap', 'round'); path.setAttribute('stroke-linejoin', 'round');
  path.setAttribute('fill', 'none');
  svg.appendChild(path);

  if (speed !== undefined) {
    const lbl = document.createElement('div');
    lbl.style.cssText = 'margin-top:3px;background:#00365a;color:#fff;font-size:11px;font-weight:700;padding:2px 7px;border-radius:20px;white-space:nowrap;box-shadow:0 1px 4px rgba(0,0,0,0.18);';
    lbl.textContent = `${Math.round(speed)} ${unit} · ${dirLabel}`;
    wrapper.appendChild(svg);
    wrapper.appendChild(lbl);
  } else {
    wrapper.appendChild(svg);
  }
  return wrapper;
}

async function queryWeatherAt(lat, lng) {
  if (!TOMORROW_KEY) {
    showStatus('Falta la API key de Tomorrow.io.', 'msg-error');
    return;
  }
  const units = document.getElementById('units-select').value;
  clearStatus();
  try {
    const cacheKey = `${lat.toFixed(3)},${lng.toFixed(3)},${units}`;
    const cached = window._weatherCache && window._weatherCache[cacheKey];
    if (cached && (Date.now() - cached.ts) < 600000) {
      showStatus('Datos desde caché (< 10 min)', 'msg-info');
      setTimeout(clearStatus, 2000);
      var data = cached.data;
      var v = data.data.values;
      var name = data.location.name || `${lat.toFixed(4)}, ${lng.toFixed(4)}`;
      var windDeg = v.windDirection != null ? v.windDirection : 0;
      var tempUnit = units === 'metric' ? '°C' : '°F';
      var windUnit = units === 'metric' ? 'km/h' : 'mph';
      document.getElementById('weather-card').style.display = 'block';
      document.getElementById('loc-name').textContent = name;
      document.getElementById('loc-time').textContent = new Date(data.data.time).toLocaleString();
      document.getElementById('temp-value').textContent = `${Math.round(v.temperature)}${tempUnit}`;
      document.getElementById('humidity-val').textContent = `${Math.round(v.humidity)}%`;
      document.getElementById('wind-val').textContent = `${Math.round(v.windSpeed)} ${windUnit}`;
      document.getElementById('precip-val').textContent = `${Math.round(v.precipitationProbability || 0)}%`;
      document.getElementById('uv-val').textContent = `${Math.round(v.uvIndex != null ? v.uvIndex : 0)}`;
      document.getElementById('wind-arrow').style.transform = `rotate(${Math.round(windDeg)}deg)`;
      document.getElementById('wind-dir-label').textContent = `${Math.round(windDeg)}° · ${compassLabel(windDeg)}`;
      if (mapLoaded && map) {
        const windUnit2 = units === 'metric' ? 'km/h' : 'mph';
        if (marker) { marker.map = null; }
        marker = new google.maps.marker.AdvancedMarkerElement({
          position: { lat, lng }, map: map,
          content: makeWindMarkerElement(windDeg, v.windSpeed, windUnit2, compassLabel(windDeg))
        });
      }
      return;
    }
    const url = `https://api.tomorrow.io/v4/weather/realtime?location=${lat},${lng}&units=${units}&apikey=${TOMORROW_KEY}`;
    const res = await fetch(url, { headers: { accept: 'application/json' } });
    if (!res.ok) {
      const body = await res.text();
      if (res.status === 429) {
        showStatus('Límite de llamadas alcanzado (25/hora en plan gratuito). Espera unos minutos e intenta de nuevo.', 'msg-error');
        return;
      }
      throw new Error(`HTTP ${res.status}: ${body.slice(0, 150)}`);
    }
    const data = await res.json();
    const v = data.data.values;
    const name = data.location.name || `${lat.toFixed(4)}, ${lng.toFixed(4)}`;
    const windDeg = v.windDirection != null ? v.windDirection : 0;
    const tempUnit = units === 'metric' ? '°C' : '°F';
    const windUnit = units === 'metric' ? 'km/h' : 'mph';

    document.getElementById('weather-card').style.display = 'block';
    document.getElementById('loc-name').textContent = name;
    document.getElementById('loc-time').textContent = new Date(data.data.time).toLocaleString();
    document.getElementById('temp-value').textContent = `${Math.round(v.temperature)}${tempUnit}`;
    document.getElementById('humidity-val').textContent = `${Math.round(v.humidity)}%`;
    document.getElementById('wind-val').textContent = `${Math.round(v.windSpeed)} ${windUnit}`;
    document.getElementById('precip-val').textContent = `${Math.round(v.precipitationProbability || 0)}%`;
    document.getElementById('uv-val').textContent = `${Math.round(v.uvIndex != null ? v.uvIndex : 0)}`;
    document.getElementById('wind-arrow').style.transform = `rotate(${Math.round(windDeg)}deg)`;
    document.getElementById('wind-dir-label').textContent = `${Math.round(windDeg)}° · ${compassLabel(windDeg)}`;

    if (mapLoaded && map) {
      const windUnit2 = units === 'metric' ? 'km/h' : 'mph';
      if (marker) { marker.map = null; }
      marker = new google.maps.marker.AdvancedMarkerElement({
        position: { lat, lng },
        map: map,
        content: makeWindMarkerElement(windDeg, v.windSpeed, windUnit2, compassLabel(windDeg))
      });
    }

    if (!window._weatherCache) window._weatherCache = {};
    window._weatherCache[`${lat.toFixed(3)},${lng.toFixed(3)},${units}`] = { data: data, ts: Date.now() };
    window._lastCoords = { lat, lng };
    await queryHourlyForecast(lat, lng, units);

  } catch (err) {
    showStatus(`Error consultando Tomorrow.io: ${err.message}`, 'msg-error');
  }
}

let forecastMarkers = [];
let _queryDebounceTimer = null;

function clearForecastMarkers() {
  forecastMarkers.forEach(m => { m.map = null; });
  forecastMarkers = [];
}

function makeHourMarker(deg, label) {
  const div = document.createElement('div');
  div.style.cssText = 'display:flex;flex-direction:column;align-items:center;cursor:default;';
  const NS = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(NS, 'svg');
  svg.setAttribute('width', '28');
  svg.setAttribute('height', '28');
  svg.setAttribute('viewBox', '-2 -2 28 28');
  svg.style.transform = `rotate(${Math.round(deg)}deg)`;
  const circle = document.createElementNS(NS, 'circle');
  circle.setAttribute('cx', '12'); circle.setAttribute('cy', '12'); circle.setAttribute('r', '11');
  circle.setAttribute('fill', '#e8eef7'); circle.setAttribute('stroke', '#184f90'); circle.setAttribute('stroke-width', '1.5');
  svg.appendChild(circle);
  const path = document.createElementNS(NS, 'path');
  path.setAttribute('d', 'M12 4 L12 20 M12 4 L8 11 M12 4 L16 11');
  path.setAttribute('stroke', '#184f90'); path.setAttribute('stroke-width', '2.5');
  path.setAttribute('stroke-linecap', 'round'); path.setAttribute('stroke-linejoin', 'round');
  path.setAttribute('fill', 'none');
  svg.appendChild(path);
  const lbl = document.createElement('div');
  lbl.textContent = label;
  lbl.style.cssText = 'font-size:9px;color:#00365a;font-weight:700;background:rgba(255,255,255,0.85);border-radius:3px;padding:0 2px;margin-top:1px;';
  div.appendChild(svg);
  div.appendChild(lbl);
  return div;
}

async function queryHourlyForecast(lat, lng, units) {
  try {
    const fcCacheKey = `fc_${lat.toFixed(3)},${lng.toFixed(3)},${units}`;
    if (window._weatherCache && window._weatherCache[fcCacheKey] && (Date.now() - window._weatherCache[fcCacheKey].ts) < 600000) {
      var data = window._weatherCache[fcCacheKey].data;
    } else {
      const url = `https://api.tomorrow.io/v4/weather/forecast?location=${lat},${lng}&units=${units}&timesteps=1h&apikey=${TOMORROW_KEY}`;
      const res = await fetch(url, { headers: { accept: 'application/json' } });
      if (!res.ok) {
        const body = await res.text();
        if (res.status === 429) { document.getElementById('hourly-card').style.display = 'none'; return; }
        throw new Error(`Forecast HTTP ${res.status}: ${body.slice(0, 200)}`);
      }
      var data = await res.json();
      if (!window._weatherCache) window._weatherCache = {};
      window._weatherCache[fcCacheKey] = { data: data, ts: Date.now() };
    }
    if (!data.timelines || !data.timelines.hourly) {
      throw new Error('Estructura inesperada: ' + JSON.stringify(Object.keys(data)));
    }
    const hourly = data.timelines.hourly.slice(0, 24);
    const windUnit = units === 'metric' ? 'km/h' : 'mph';
    const scroll = document.getElementById('hourly-scroll');
    scroll.innerHTML = '';
    document.getElementById('hourly-card').style.display = 'block';

    hourly.forEach(function(h) {
      const v = h.values;
      const windDeg = v.windDirection != null ? v.windDirection : 0;
      const time = new Date(h.time);
      const hourLabel = time.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

      const card = document.createElement('div');
      card.className = 'hour-card';

      const pTime = document.createElement('p');
      pTime.className = 'hour-time';
      pTime.textContent = hourLabel;

      const NS = 'http://www.w3.org/2000/svg';
      const svg = document.createElementNS(NS, 'svg');
      svg.setAttribute('viewBox', '-2 -2 28 28');
      svg.setAttribute('class', 'hour-wind-arrow');
      svg.style.transform = 'rotate(' + Math.round(windDeg) + 'deg)';
      svg.style.transformOrigin = 'center center';

      const circle = document.createElementNS(NS, 'circle');
      circle.setAttribute('cx', '12');
      circle.setAttribute('cy', '12');
      circle.setAttribute('r', '11');
      circle.setAttribute('fill', '#e8eef7');
      circle.setAttribute('stroke', '#184f90');
      circle.setAttribute('stroke-width', '1');
      svg.appendChild(circle);

      const path = document.createElementNS(NS, 'path');
      path.setAttribute('d', 'M12 4 L12 20 M12 4 L8 11 M12 4 L16 11');
      path.setAttribute('stroke', '#184f90');
      path.setAttribute('stroke-width', '2.5');
      path.setAttribute('stroke-linecap', 'round');
      path.setAttribute('stroke-linejoin', 'round');
      path.setAttribute('fill', 'none');
      svg.appendChild(path);

      const pTemp = document.createElement('p');
      pTemp.className = 'hour-temp';
      pTemp.textContent = Math.round(v.temperature) + '°';

      const pWind = document.createElement('p');
      pWind.className = 'hour-wind-val';
      pWind.textContent = Math.round(v.windSpeed) + ' ' + windUnit;

      const pDir = document.createElement('p');
      pDir.className = 'hour-wind-val';
      pDir.textContent = compassLabel(windDeg);

      card.appendChild(pTime);
      card.appendChild(svg);
      card.appendChild(pTemp);
      card.appendChild(pWind);
      card.appendChild(pDir);
      scroll.appendChild(card);
    });

    document.getElementById('hourly-card').style.display = 'block';

  } catch (err) {
    showStatus('Error cargando pronóstico horario: ' + err.message, 'msg-error');
    document.getElementById('hourly-card').style.display = 'none';
  }
}

let tomorrowOverlay = null;

function applyTomorrowOverlay(layer) {
  if (!TOMORROW_KEY) { showStatus('Falta API key de Tomorrow.io', 'msg-error'); return; }
  if (!mapLoaded || !map) { showStatus('El mapa aún no está listo', 'msg-error'); return; }
  if (typeof google === 'undefined' || !google.maps || !google.maps.ImageMapType) {
    showStatus('Google Maps SDK no cargado aún', 'msg-error'); return;
  }
  map.overlayMapTypes.clear();
  tomorrowOverlay = null;
  const opacity = parseFloat(document.getElementById('overlay-opacity').value) || 0.7;
  const key = TOMORROW_KEY;
  tomorrowOverlay = new google.maps.ImageMapType({
    getTileUrl: function(coord, zoom) {
      if (zoom > 12) return null;
      return 'https://api.tomorrow.io/v4/map/tile/' + zoom + '/' + coord.x + '/' + coord.y + '/' + layer + '/now.png?apikey=' + key;
    },
    tileSize: new google.maps.Size(256, 256),
    maxZoom: 12,
    minZoom: 1,
    name: layer,
    opacity: opacity
  });
  map.overlayMapTypes.insertAt(0, tomorrowOverlay);
  document.getElementById('tile-note-status').textContent = 'Capa activa: ' + layer;
}

function latLngToTile(lat, lon, zoom) {
  const x = Math.floor((lon + 180) / 360 * Math.pow(2, zoom));
  const latRad = lat * Math.PI / 180;
  const y = Math.floor((1 - Math.log(Math.tan(latRad) + 1 / Math.cos(latRad)) / Math.PI) / 2 * Math.pow(2, zoom));
  return { x, y };
}

async function fetchTomorrowTile(lat, lng) {
  const layer = document.getElementById('layer-select').value;
  const zoom = parseInt(document.getElementById('tile-zoom').value, 10);
  const { x, y } = latLngToTile(lat, lng, zoom);
  const url = `https://api.tomorrow.io/v4/map/tile/${zoom}/${x}/${y}/${layer}/now.png?apikey=${TOMORROW_KEY}`;

  const img = document.getElementById('tile-img');
  const placeholder = document.getElementById('tile-placeholder');
  const urlDisplay = document.getElementById('tile-url-display');

  placeholder.textContent = 'Cargando tile...';
  placeholder.style.display = 'block';
  img.style.display = 'none';
  urlDisplay.textContent = `Zoom ${zoom} · Tile x:${x} y:${y} · Capa: ${layer}`;

  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const blob = await res.blob();
    const objUrl = URL.createObjectURL(blob);
    if (img._blobUrl) URL.revokeObjectURL(img._blobUrl);
    img._blobUrl = objUrl;
    img.src = objUrl;
    img.style.display = 'block';
    placeholder.style.display = 'none';
  } catch (err) {
    placeholder.textContent = `Error cargando tile: ${err.message}`;
    placeholder.style.display = 'block';
    img.style.display = 'none';
  }
}

function placeMarkerAndQuery(lat, lng) {
  if (mapLoaded && map) {
    clearForecastMarkers();
    const pos = { lat: lat, lng: lng };
    map.panTo(pos);
    if (marker) { marker.map = null; marker = null; }
  }
  queryWeatherAt(lat, lng);
}

function initWeatherMap() {
  mapLoaded = true;
  clearStatus();
  const initialLat = parseFloat(document.getElementById('lat-input').value) || 9.9281;
  const initialLng = parseFloat(document.getElementById('lng-input').value) || -84.0907;
  map = new google.maps.Map(document.getElementById('map'), {
    center: { lat: initialLat, lng: initialLng },
    zoom: 8,
    mapTypeControl: true,
    mapTypeControlOptions: {
      style: google.maps.MapTypeControlStyle.HORIZONTAL_BAR,
      position: google.maps.ControlPosition.TOP_RIGHT,
      mapTypeIds: ['roadmap', 'satellite', 'hybrid', 'terrain']
    },
    streetViewControl: false,
    fullscreenControl: true,
    mapId: 'DEMO_MAP_ID'
  });

  map.addListener('click', function(e) {
    const lat = e.latLng.lat();
    const lng = e.latLng.lng();
    document.getElementById('lat-input').value = lat.toFixed(4);
    document.getElementById('lng-input').value = lng.toFixed(4);
    clearTimeout(_queryDebounceTimer);
    _queryDebounceTimer = setTimeout(function() {
      placeMarkerAndQuery(lat, lng);
    }, 600);
  });

  // Aplicar overlay de Tomorrow.io
  if (TOMORROW_KEY) {
    document.getElementById('tile-card').style.display = 'block';
    document.getElementById('toggle-overlay-btn').textContent = 'Ocultar capa';
    applyTomorrowOverlay(document.getElementById('layer-select').value);
  }
  // Consulta inicial con pequeño delay para no chocar con el overlay
  setTimeout(function() {
    placeMarkerAndQuery(initialLat, initialLng);
  }, 400);
}
window.initWeatherMap = initWeatherMap;

document.getElementById('go-btn').addEventListener('click', function() {
  const lat = parseFloat(document.getElementById('lat-input').value);
  const lng = parseFloat(document.getElementById('lng-input').value);
  if (isNaN(lat) || isNaN(lng)) {
    showStatus('Ingresa valores numéricos válidos de latitud y longitud.', 'msg-error');
    return;
  }
  placeMarkerAndQuery(lat, lng);
});

document.getElementById('units-select').addEventListener('change', function() {
  const lat = parseFloat(document.getElementById('lat-input').value);
  const lng = parseFloat(document.getElementById('lng-input').value);
  if (!isNaN(lat) && !isNaN(lng)) {
    placeMarkerAndQuery(lat, lng);
  }
});

document.getElementById('layer-select').addEventListener('change', function() {
  if (mapLoaded) applyTomorrowOverlay(this.value);
});

document.getElementById('overlay-opacity').addEventListener('input', function() {
  const val = parseFloat(this.value);
  document.getElementById('overlay-opacity-val').textContent = Math.round(val * 100) + '%';
  if (tomorrowOverlay) tomorrowOverlay.setOpacity(val);
});

document.getElementById('toggle-overlay-btn').addEventListener('click', function() {
  if (tomorrowOverlay) {
    map.overlayMapTypes.clear();
    tomorrowOverlay = null;
    this.textContent = 'Mostrar capa';
  } else {
    applyTomorrowOverlay(document.getElementById('layer-select').value);
    this.textContent = 'Ocultar capa';
  }
});

document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    if (document.activeElement.id === 'google-key-input' || document.activeElement.id === 'tomorrow-key-input') {
      document.getElementById('save-keys-btn').click();
    } else if (document.activeElement.id === 'lat-input' || document.activeElement.id === 'lng-input') {
      document.getElementById('go-btn').click();
    }
  }
});

</script>
